<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <circle cx="16" cy="16" r="15" fill="#1A3F78"/>
  <!-- equator -->
  <ellipse cx="16" cy="16" rx="15" ry="6" fill="none" stroke="#00C8BE" stroke-width="1.2"/>
  <!-- prime meridian -->
  <ellipse cx="16" cy="16" rx="6" ry="15" fill="none" stroke="#00C8BE" stroke-width="1.2"/>
  <!-- vertical axis -->
  <line x1="16" y1="1" x2="16" y2="31" stroke="#00C8BE" stroke-width="1.2"/>
  <!-- horizontal axis -->
  <line x1="1" y1="16" x2="31" y2="16" stroke="#00C8BE" stroke-width="1.2"/>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#00C8BE" stroke-width="1.5"/>
</svg>
